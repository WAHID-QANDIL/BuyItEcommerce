name: iOS Build (KMP)
on:
  push:
    branches: [ "master" ]
  pull_request:
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (Gradle uses this)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. Strip any hardcoded Java home from gradle.properties
      #    (prevents committed Linux/Windows paths from breaking macOS builds)
      - name: Clean gradle.properties Java home
        run: |
          if [ -f gradle.properties ]; then
            sed -i '' '/org\.gradle\.java\.home/d' gradle.properties
          fi

      # 5. Cache Kotlin/Native (huge speed boost)
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      # 6. Install CocoaPods
      - name: Install CocoaPods
        run: sudo gem install cocoapods

      # 7. Build shared KMP module
      - name: Build shared module
        run: ./gradlew :shared:assemble --stacktrace

      # 8. Install Pods (links KMP framework into iOS)
      - name: Pod install
        run: |
          cd iosApp
          pod install

      # 9. Build iOS app (simulator → no signing headaches)
      - name: Build iOS App
        run: |
          xcodebuild \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
